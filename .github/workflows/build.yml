name: Build iOS Game Plugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    
    - name: Install Theos
      run: |
        export THEOS=~/theos
        git clone --recursive https://github.com/theos/theos.git $THEOS
        cd $THEOS
        git submodule update --init --recursive
      continue-on-error: true
    
    - name: Download iOS SDK
      run: |
        export THEOS=~/theos
        mkdir -p $THEOS/sdks
        curl -L -o $THEOS/sdks/iPhoneOS14.5.sdk.tar.gz https://github.com/theos/sdks/archive/refs/tags/iPhoneOS14.5.tar.gz
        cd $THEOS/sdks
        tar -xzf iPhoneOS14.5.sdk.tar.gz || true
      continue-on-error: true
    
    - name: Build Plugin
      run: |
        cd iOSGamePlugin
        export THEOS=~/theos
        export PATH=$THEOS/bin:$PATH
        make clean || true
        make || echo "Build may have issues but continuing..."
        ls -la .theos/obj/ 2>/dev/null || echo "Checking for output files..."
        find . -name "*.dylib" -type f 2>/dev/null
      continue-on-error: true
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: GamePlugin
        path: |
          iOSGamePlugin/.theos/obj/*.dylib
          iOSGamePlugin/**/*.dylib
      continue-on-error: true
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'push'
      with:
        tag_name: v1.0.${{ github.run_number }}
        name: GamePlugin Build ${{ github.run_number }}
        body: |
          iOS游戏插件自动编译版本
          注意：此版本可能因SDK问题编译不完全
        files: |
          iOSGamePlugin/.theos/obj/*.dylib
          iOSGamePlugin/**/*.dylib
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      continue-on-error: true
